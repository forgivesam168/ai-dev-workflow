name: Verify Change Package

on:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify lifecycle and Change Package semantics without mutation
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          $before = @(git status --porcelain=v1)
          $failed = $false

          & pwsh -NoProfile -File ./tools/check-lifecycle-contract.ps1
          if ($LASTEXITCODE -ne 0) { $failed = $true }

          & pwsh -NoProfile -File ./tools/verify-change-package.ps1 -BaseRef $env:BASE_SHA
          if ($LASTEXITCODE -ne 0) { $failed = $true }

          $after = @(git status --porcelain=v1)
          if (-not [System.Linq.Enumerable]::SequenceEqual([string[]]$before, [string[]]$after)) {
            Write-Error 'Lifecycle verification changed the working tree.'
            $failed = $true
          }

          if ($failed) { exit 1 }
